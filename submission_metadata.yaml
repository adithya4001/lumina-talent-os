# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "GitHub Copilot"

ai_usage_summary: |
  Used Gemini for architectural design, code logic optimization, and documentation. 
  GitHub Copilot was used for efficient code autocompletion. 
  No candidate data was ever sent to external LLMs during the ranking pipeline; 
  processing was done strictly locally using deterministic heuristic models.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  LUMINA Talent OS utilizes a hybrid approach: semantic vector embeddings for 
  contextual capability matching, combined with unsupervised K-Means clustering 
  to eliminate human bias in tiering. The system ranks candidates based on 
  JD alignment, behavioral signal multipliers (response rate, engagement), 
  and experience-tenure stability. It explicitly handles 'honeypot' traps by 
  validating skill-duration consistency and detecting keyword-stuffing patterns. 
  The final output is a strictly compliant ranked CSV with reasoning strings 
  generated by capturing latent markers from the candidate's career history. 
  The ranking process executes in < 3 minutes on CPU within 16GB RAM constraints.

